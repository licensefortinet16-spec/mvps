services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financa
      POSTGRES_USER: financa
      POSTGRES_PASSWORD: financa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app/static/uploads:/app/app/static/uploads

volumes:
  postgres_data:

