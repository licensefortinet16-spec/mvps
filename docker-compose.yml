services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financa
      POSTGRES_USER: financa
      POSTGRES_PASSWORD: financa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financa -d financa"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/static/uploads:/app/app/static/uploads

volumes:
  postgres_data:
