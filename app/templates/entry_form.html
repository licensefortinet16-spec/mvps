{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-2xl rounded-3xl bg-white p-8 shadow-xl">
  <h1 class="text-3xl font-black text-slate-900">Novo lancamento manual</h1>
  <form method="post" action="/entries/new" class="mt-6 grid gap-4 md:grid-cols-2">
    <input name="title" placeholder="Titulo" class="rounded-2xl border border-slate-200 px-4 py-3 md:col-span-2" required />
    <input name="category" placeholder="Categoria" class="rounded-2xl border border-slate-200 px-4 py-3" required />
    <select name="entry_type" class="rounded-2xl border border-slate-200 px-4 py-3" required>
      <option value="income">Receita</option>
      <option value="expense">Despesa</option>
    </select>
    <input name="amount" type="number" step="0.01" min="0" placeholder="Valor" class="rounded-2xl border border-slate-200 px-4 py-3" required />
    <input name="occurred_on" type="date" class="rounded-2xl border border-slate-200 px-4 py-3" required />
    <textarea name="notes" placeholder="Observacoes" class="rounded-2xl border border-slate-200 px-4 py-3 md:col-span-2"></textarea>
    <button class="rounded-2xl bg-teal-600 px-4 py-3 font-bold text-white md:col-span-2">Salvar lancamento</button>
  </form>
</div>
{% endblock %}
